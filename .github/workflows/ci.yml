name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  RUST_BACKTRACE: '1'

jobs:
  source-policy:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
          GITLEAKS_VERSION: 8.30.1
        run: |
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) platform="darwin_arm64" ;;
            Linux-x86_64) platform="linux_x64" ;;
            *) echo "unsupported Gitleaks platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac

          archiveName="gitleaks_${GITLEAKS_VERSION}_${platform}.tar.gz"
          gh release download "v${GITLEAKS_VERSION}" \
            --repo gitleaks/gitleaks \
            --pattern "$archiveName" \
            --dir "$RUNNER_TEMP"
          tar -xzf "$RUNNER_TEMP/$archiveName" -C "$RUNNER_TEMP" gitleaks
      - name: Reject committed secrets
        run: |
          set -o pipefail
          "$RUNNER_TEMP/gitleaks" git --config .gitleaks.toml --redact --verbose 2>&1 | tee gitleaks.log
      - name: Test source installer
        run: |
          set -o pipefail
          scripts/test-install.sh 2>&1 | sed -E 's/(sk-or-v1-|OPENROUTER_API_KEY=)[^[:space:]]+/\1[REDACTED]/g' | tee installer-test.log
      - name: Check release tag contract
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/check-release-tag.sh "$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-policy-logs-${{ matrix.os }}
          path: '*.log'

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy
      - name: Install DotSlash
        run: cargo install dotslash --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked -p xai-grok-update -p xai-grok-pager-bin --all-targets -- -D warnings
      - run: cargo test --locked -p xai-grok-update --lib
      - run: cargo test --locked -p xai-grok-sampler -p xai-grok-config -p xai-grok-secrets -p xai-grok-auth
      - run: cargo install cargo-deny --locked
      - run: cargo deny check licenses bans sources
      - name: Report dependency advisories
        continue-on-error: true
        run: cargo deny check advisories

  pager-build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - name: Install DotSlash
        run: cargo install dotslash --locked
      - name: Build distribution binary
        run: |
          set -o pipefail
          cargo build --locked --profile release-dist -p xai-grok-pager-bin --bin echo-build 2>&1 | sed -E 's/(sk-or-v1-|OPENROUTER_API_KEY=)[^[:space:]]+/\1[REDACTED]/g' | tee build.log
      - name: Verify product, version, and source revision
        run: target/release-dist/echo-build --version | grep -E '^echo-build [0-9]+\.[0-9]+\.[0-9]+.* \([0-9a-f]+\)$'
      - name: Run selected PTY smoke test
        run: cargo test --locked -p xai-grok-pager-pty-harness --lib -- --nocapture
      - name: Credential-store smoke test
        run: cargo test --locked -p xai-grok-secrets -- --nocapture
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pager-build-${{ matrix.os }}
          path: build.log
